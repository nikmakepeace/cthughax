cthugha.verbose             : 0                     # log level: 0 error, 1 warn, 2 info, 5 debug, 10 trace

cthugha.snd-method          : 3
cthugha.mit-shm             : no

cthugha.display             : locked:15
cthugha.flashlight.?        : locked:off
cthugha.wave-scale          : 1
cthugha.sound-processing    : 0
cthugha.palette-smoothing   : no
cthugha.palette-set         : cthugha53

cthugha.disp-mode           : 1
cthugha.buff-size           : 1

cthugha.quiet-file          : fortune.txt
cthugha.qotd                : yes
